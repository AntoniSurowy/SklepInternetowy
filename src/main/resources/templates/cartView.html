<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MyShop</title>
    <link rel="stylesheet" type="text/css" href="/css/style.css">
</head>
<body>
    <header th:replace="fragments/header :: SklepHeader"></header>

    <div class="main-content">

        <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">

            <table cellspacing="0">
                <tr>
                    <th style="width: 30px;">No.</th>
                    <th style="width: 50px;"></th>
                    <th>Nazwa</th>
                    <th>Ilość</th>
                    <th>Suma</th>
                    <th style="width: 30px;"></th>
                </tr>
                <tr th:each="cartItem : ${@cart.cartItems}">
                    <td>1</td>
                    <td>
                        <img alt="logo" th:src="@{${cartItem.item.imgUrl}}">
                    </td>
                    <td th:text="${cartItem.item.name}"></td>
                    <td style="display: flex; padding-top: 10px">
                        <a class="mbtn" href="">-</a>
                        <p th:text="${cartItem.counter}"></p>
                        <a class="mbtn" href="">+</a>
                    </td>
                    <td th:text="${cartItem.price}"></td>
                    <td>
                        <a class="mbtn" href="">X</a>
                    </td>
                </tr>
            </table>

            <div class="summary">
                <p><span>Do zapłaty</span><span th:text="${@cart.sum}"></span>zł</p>
            </div>
            <a href="" class="add-btn">Dalej</a>
        </div>
    </div>
</body>
</html>
