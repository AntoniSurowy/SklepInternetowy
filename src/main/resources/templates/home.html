<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MyShop</title>
    <link rel="stylesheet" type="text/css" href="/css/style.css">

</head>
<body>
    <header th:replace="fragments/header :: SklepHeader"></header>
    <div class="main-content">
        <div class="item" th:each="item: ${items}">
            <p class="item-name" th:text="${item.getName()}"/>

            <img th:src="${item.getImgUrl()}" alt="logo">

            <div>
                <span>Cena: </span>
                <span th:text="${item.getPrice()}"/>
                <span>zł</span>
            </div>

            <a th:href="@{'/add/'+${item.id}}" class="add-btn">Dodaj</a>
        </div>

    </div>
</body>
</html>
